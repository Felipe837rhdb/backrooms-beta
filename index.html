<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BACKROOMS: 266x266 EDITION</title>
    <style>
        /* Bloqueio total de seleção e menus de contexto para evitar interrupções */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            user-select: none; -webkit-user-select: none; 
            -webkit-touch-callout: none; 
            touch-action: none;
        }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        
        /* Menu Inicial baseado no layout solicitado */
        #menu-inicial {
            position: fixed; inset: 0; background: #1a1a05; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 15px; border: 8px solid #222;
        }
        .btn-menu {
            width: 260px; padding: 18px; background: #2a2a1a; border: 2px solid #ffff00;
            color: #ffff00; font-size: 18px; font-weight: bold; text-align: center;
            cursor: pointer; letter-spacing: 2px; text-transform: uppercase;
        }
        .btn-menu:active { background: #ffff00; color: #000; }

        /* Pop-ups de Créditos e "Em Breve" */
        .pop-up {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; padding: 25px; background: #111; border: 3px solid #ffff00;
            color: #ffff00; text-align: center; display: none; z-index: 2000;
        }
        .close-x { position: absolute; top: 5px; right: 10px; color: #f00; font-size: 22px; cursor: pointer; font-weight: bold; }

        /* Interface do Jogo */
        canvas#c { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; }
        #ui { position: fixed; top: 25px; left: 25px; color: #ff0000; z-index: 10; font-size: 14px; display: none; pointer-events: none; }
        #minimap-container { position: fixed; top: 20px; right: 20px; width: 110px; height: 110px; border: 2px solid #ffff00; background: rgba(0,0,0,0.9); z-index: 10; display: none; }
        
        /* Controles de Movimentação */
        .controls { position: fixed; bottom: 40px; width: 100%; display: none; justify-content: space-between; padding: 0 30px; z-index: 20; }
        .dpad { display: grid; grid-template-columns: repeat(3, 75px); gap: 10px; }
        .btn-game { 
            width: 75px; height: 75px; background: rgba(255,255,0,0.1); border: 2px solid #ffff00; 
            color: #ffff00; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-weight: bold;
        }
        #jump { width: 95px; height: 95px; border-radius: 50%; border: 3px solid #ffff00; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="menu-inicial">
    <h1 style="color: #ffff00; letter-spacing: 8px; margin-bottom: 20px; text-shadow: 2px 2px #000;">BACKROOMS</h1>
    <div class="btn-menu" id="play-trigger" onclick="iniciarJogo()">PLAY</div>
    <div class="btn-menu" onclick="abrirPop('pop-breve')">CONTINUAR</div>
    <div class="btn-menu" onclick="abrirPop('pop-creditos')">CRÉDITOS</div>
</div>

<div id="pop-breve" class="pop-up">
    <span class="close-x" onclick="fecharPops()">X</span>
    <p>EM BREVE...</p>
</div>

<div id="pop-creditos" class="pop-up">
    <span class="close-x" onclick="fecharPops()">X</span>
    <p>Jogo Feito por um desenvolvedor solo ©</p>
</div>

<div id="ui">● REC <br>LEVEL 0 - EXPLORAÇÃO</div>
<div id="minimap-container"><canvas id="m"></canvas></div>

<div class="controls" id="game-ui">
    <div class="dpad">
        <div></div><div class="btn-game" id="w">W</div><div></div>
        <div class="btn-game" id="a">A</div><div class="btn-game" id="s">S</div><div class="btn-game" id="d">D</div>
    </div>
    <div class="btn-game" id="jump">PULO</div>
</div>

<canvas id="c"></canvas>

<script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    const mCanvas = document.getElementById('m'), mCtx = mCanvas.getContext('2d');
    
    // Configurações do Mapa 266x266
    let world = [], size = 266; 
    let p = { x: 133, y: 133, dir: 0, z: 0, vz: 0, walk: 0, speed: 0.05 }; // Velocidade reduzida para imersão
    let keys = { w: false, a: false, s: false, d: false };
    let gameRunning = false;

    function abrirPop(id) {
        fecharPops();
        document.getElementById(id).style.display = 'block';
    }

    function fecharPops() {
        document.querySelectorAll('.pop-up').forEach(p => p.style.display = 'none');
    }

    function iniciarJogo() {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        document.getElementById('minimap-container').style.display = 'block';
        document.getElementById('game-ui').style.display = 'flex';
        
        // Tenta ativar o fullscreen no clique
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        }
        
        gerarLabirinto();
        gameRunning = true;
        loop();
    }

    function gerarLabirinto() {
        world = Array.from({length: size}, () => Array(size).fill(0));
        for(let i=0; i<size; i++) {
            for(let j=0; j<size; j++) {
                // Paredes externas
                if(i===0 || j===0 || i===size-1 || j===size-1) {
                    world[i][j] = 1;
                } 
                // Geração de colunas e salas
                else if (i % 12 === 0 && j % 12 === 0) {
                    world[i][j] = 1;
                }
                else if (Math.random() > 0.985) {
                    world[i][j] = 1;
                }
            }
        }
        world[Math.floor(p.y)][Math.floor(p.x)] = 0; // Garante spawn livre
    }

    // Configuração dos botões para evitar menus de sistema (Copiar/Compartilhar)
    const setupBtn = (id) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            if(id === 'jump' && p.z === 0) p.vz = 0.25; 
            else keys[id] = true;
        }, {passive: false});
        
        el.addEventListener('touchend', (e) => {
            e.preventDefault();
            keys[id] = false;
        }, {passive: false});
    };
    ['w','a','s','d','jump'].forEach(setupBtn);

    // Controle de Câmera suave via arraste
    let lastX = null;
    canvas.addEventListener('touchstart', e => {
        lastX = e.touches[0].clientX;
    }, {passive: false});

    canvas.addEventListener('touchmove', e => {
        if(lastX !== null) {
            let delta = e.touches[0].clientX - lastX;
            p.dir += delta * 0.007;
            lastX = e.touches[0].clientX;
        }
    }, {passive: false});

    function loop() {
        if(!gameRunning) return;
        
        // Ajuste de resolução dinâmica
        canvas.width = window.innerWidth / 2; 
        canvas.height = window.innerHeight / 2;

        let mx = (keys.w - keys.s) * Math.cos(p.dir) + (keys.a - keys.d) * Math.sin(p.dir);
        let my = (keys.w - keys.s) * Math.sin(p.dir) - (keys.a - keys.d) * Math.cos(p.dir);
        
        // Colisão com as paredes do mapa 266x266
        if(world[Math.floor(p.y)][Math.floor(p.x + mx * 0.6)] === 0) p.x += mx * p.speed;
        if(world[Math.floor(p.y + my * 0.6)][Math.floor(p.x)] === 0) p.y += my * p.speed;

        p.z += p.vz; 
        p.vz -= 0.015; 
        if(p.z < 0) p.z = 0;
        
        p.walk += (keys.w || keys.s || keys.a || keys.d) ? 0.1 : 0;

        renderizarCena();
        desenharMinimapa();
        requestAnimationFrame(loop);
    }

    function renderizarCena() {
        const w = canvas.width, h = canvas.height;
        const bob = Math.sin(p.walk) * 2 - (p.z * 40);

        // Cores baseadas nas referências
        ctx.fillStyle = "#3a3a20"; ctx.fillRect(0, 0, w, h); // Teto
        ctx.fillStyle = "#201800"; ctx.fillRect(0, h/2 + bob, w, h/2); // Chão Amarelo Escuro

        for(let x = 0; x < w; x++) {
            let angle = (p.dir - 0.5) + (x / w);
            let d = 0, rx = p.x, ry = p.y, cx = Math.cos(angle), cy = Math.sin(angle);
            
            // Raycasting
            while(d < 20) {
                d += 0.2; rx += cx * 0.2; ry += cy * 0.2;
                if(world[Math.floor(ry)]?.[Math.floor(rx)] === 1) break;
            }
            
            let wallH = h / (d * Math.cos(angle - p.dir));
            let shad = Math.max(0, 200 - (d * 11));
            
            ctx.fillStyle = `rgb(${shad},${shad * 0.9},0)`; // Paredes amareladas
            ctx.fillRect(x, (h - wallH) / 2 + bob, 1, wallH);
        }
    }

    function desenharMinimapa() {
        mCanvas.width = 110; mCanvas.height = 110;
        const s = 110 / size;
        mCtx.fillStyle = "#222";
        mCtx.fillRect(0, 0, 110, 110);
        
        // Renderiza apenas paredes próximas no minimapa para performance
        for(let y = Math.floor(p.y - 25); y < p.y + 25; y++) {
            for(let x = Math.floor(p.x - 25); x < p.x + 25; x++) {
                if(world[y]?.[x] === 1) {
                    mCtx.fillStyle = "#444";
                    mCtx.fillRect(x * s, y * s, 1.5, 1.5);
                }
            }
        }
        mCtx.fillStyle = "#0f0"; mCtx.fillRect(p.x * s, p.y * s, 4, 4);
    }
</script>
</body>
</html>
